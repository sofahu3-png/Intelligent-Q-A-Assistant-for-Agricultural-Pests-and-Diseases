<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农业病虫害智能问答助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .chat-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            max-height: 600px;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            font-size: 1.3rem;
        }
        
        .chat-header button {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chat-header button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message, .bot-message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .bot-message {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 5px;
        }
        
        .bot-message .source {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            font-size: 0.85rem;
            color: #666;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        
        .input-area button:active {
            transform: translateY(0);
        }
        
        .crop-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .crop-tag {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .crop-tag:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        .crop-tag.active {
            background: rgba(255,255,255,0.4);
        }
        
        .suggestions {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .suggestions h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .suggestion-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .suggestion-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e9ecef;
        }
        
        .suggestion-item:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .history-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .history-modal.active {
            display: flex;
        }
        
        .history-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
        }
        
        .history-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-header h3 {
            font-size: 1.3rem;
        }
        
        .history-header button {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 12px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .history-list {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }
        
        .history-item {
            border-bottom: 1px solid #e9ecef;
            padding: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .history-item:hover {
            background: #f8f9fa;
            padding-left: 10px;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-question {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .history-answer {
            color: #666;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }
        
        .quick-questions {
            margin-bottom: 20px;
        }
        
        .quick-questions h3 {
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .quick-question-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .quick-question {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .quick-question:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌾 农业病虫害智能问答助手</h1>
            <p>专业的农业病虫害识别与防治咨询服务</p>
        </header>
        
        <div class="quick-questions">
            <h3>快速提问</h3>
            <div class="quick-question-list">
                <span class="quick-question" onclick="sendQuestion('水稻稻飞虱怎么防治？')">水稻稻飞虱怎么防治？</span>
                <span class="quick-question" onclick="sendQuestion('小麦蚜虫的危害症状')">小麦蚜虫的危害症状</span>
                <span class="quick-question" onclick="sendQuestion('玉米螟发生规律')">玉米螟发生规律</span>
                <span class="quick-question" onclick="sendQuestion('番茄晚疫病用什么药？')">番茄晚疫病用什么药？</span>
                <span class="quick-question" onclick="sendQuestion('柑橘黄龙病怎么预防？')">柑橘黄龙病怎么预防？</span>
            </div>
        </div>
        
        <div class="crop-categories">
            <span class="crop-tag" data-crop="rice">🌾 水稻</span>
            <span class="crop-tag" data-crop="wheat">🌾 小麦</span>
            <span class="crop-tag" data-crop="corn">🌽 玉米</span>
            <span class="crop-tag" data-crop="cotton">🪡 棉花</span>
            <span class="crop-tag" data-crop="vegetables">🥬 蔬菜</span>
            <span class="crop-tag" data-crop="fruits">🍎 果树</span>
        </div>
        
        <div class="chat-box">
            <div class="chat-header">
                <h2>智能问答</h2>
                <button onclick="showHistory()">📜 历史记录</button>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <h3>欢迎使用农业病虫害智能问答助手</h3>
                    <p>请输入您的问题，我将为您提供专业的病虫害识别与防治建议</p>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="请输入您的问题，例如：水稻稻飞虱怎么防治？" onkeyup="handleKeyPress(event)">
                <button onclick="sendMessage()">
                    <span id="sendBtnText">发送</span>
                    <span id="loadingIndicator" class="loading" style="display:none;"></span>
                </button>
            </div>
        </div>
    </div>
    
    <div class="history-modal" id="historyModal">
        <div class="history-content">
            <div class="history-header">
                <h3>📜 问答历史</h3>
                <button onclick="hideHistory()">×</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <h3>暂无历史记录</h3>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let userId = localStorage.getItem('userId') || 'user_' + Date.now();
        localStorage.setItem('userId', userId);
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            
            if (!question) return;
            
            const sendBtnText = document.getElementById('sendBtnText');
            const loadingIndicator = document.getElementById('loadingIndicator');
            sendBtnText.style.display = 'none';
            loadingIndicator.style.display = 'inline-block';
            
            addMessage(question, 'user');
            input.value = '';
            document.getElementById('emptyState').style.display = 'none';
            
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    question: question,
                    user_id: userId
                })
            })
            .then(response => response.json())
            .then(data => {
                let sourcesHtml = '';
                if (data.sources && data.sources.length > 0) {
                    sourcesHtml = '<div class="source">参考来源：' + data.sources.map(s => `${s.crop} - ${s.pest_name}`).join(', ') + '</div>';
                }
                addMessage(data.answer + sourcesHtml, 'bot');
            })
            .catch(error => {
                addMessage('抱歉，服务器暂时无法响应，请稍后重试。', 'bot');
            })
            .finally(() => {
                sendBtnText.style.display = 'inline';
                loadingIndicator.style.display = 'none';
                scrollToBottom();
            });
        }
        
        function sendQuestion(question) {
            document.getElementById('questionInput').value = question;
            sendMessage();
        }
        
        function addMessage(text, type) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = type === 'user' ? 'user-message' : 'bot-message';
            contentDiv.innerHTML = text;
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            scrollToBottom();
        }
        
        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showHistory() {
            fetch(`/api/history?user_id=${userId}`)
            .then(response => response.json())
            .then(data => {
                const historyList = document.getElementById('historyList');
                
                if (!data.history || data.history.length === 0) {
                    historyList.innerHTML = '<div class="empty-state"><h3>暂无历史记录</h3></div>';
                } else {
                    historyList.innerHTML = data.history.map((item, index) => `
                        <div class="history-item" onclick="loadHistoryItem(${index})">
                            <div class="history-question">${item.question}</div>
                            <div class="history-answer">${item.answer.answer || item.answer}</div>
                        </div>
                    `).join('');
                }
                
                document.getElementById('historyModal').classList.add('active');
            });
        }
        
        function hideHistory() {
            document.getElementById('historyModal').classList.remove('active');
        }
        
        function loadHistoryItem(index) {
            fetch(`/api/history?user_id=${userId}`)
            .then(response => response.json())
            .then(data => {
                if (data.history && data.history[index]) {
                    const item = data.history[index];
                    document.getElementById('questionInput').value = item.question;
                    hideHistory();
                }
            });
        }
        
        document.querySelectorAll('.crop-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const cropName = this.textContent.replace(/[🌾🌽🪡🥬🍎]/g, '').trim();
                document.getElementById('questionInput').value = `${cropName}有哪些常见病虫害？`;
            });
        });
    </script>
</body>
</html>
